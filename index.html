        // Play Direct Video (HTML5)
        function playDirectVideo(containerElement) {
            const img = containerElement.querySelector('img');
            const overlay = containerElement.querySelector('.play-overlay');
            const video = containerElement.querySelector('video');

            if (video) {
                // IMPORTANT: Pause all other videos on the page before playing this one
                document.querySelectorAll('video').forEach(v => {
                    if (v !== video && !v.paused) {
                        v.pause();
                    }
                });

                // Hide image and play button
                if(img) img.style.display = 'none';
                if(overlay) overlay.style.display = 'none';
                
                // Show and play video
                video.classList.remove('hidden');
                video.style.opacity = '1';
                video.style.zIndex = '30';
                
                // Add an event listener in case the user manually clicks the native play button later
                video.addEventListener('play', function() {
                    document.querySelectorAll('video').forEach(v => {
                        if (v !== video && !v.paused) {
                            v.pause();
                        }
                    });
                });

                video.play().catch(error => {
                    console.log("Auto-play prevented. User must click play on the controls.");
                });
                
                // Remove the click listener so they can interact with the video controls
                containerElement.onclick = null;
                containerElement.classList.remove('cursor-pointer');
            }
        }

                             <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                        </div>
                    </div>
                </div>`;
            }

            return `
            <div class="${bgClass} rounded-2xl shadow-md overflow-hidden card-hover flex flex-col relative">
                ${badgeHTML}
                ${mediaHTML}
                <div class="p-3 sm:p-5 flex flex-col flex-grow">
                    <h3 class="text-sm sm:text-lg font-bold text-gray-900 mb-1 leading-tight">${data.title}</h3>
                    <p class="text-xs sm:text-sm text-gray-600 mb-2 sm:mb-4 flex-grow line-clamp-2">${data.description}</p>
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-3 sm:mb-4 gap-1">
                        <div>
                            <span class="text-gray-400 line-through text-xs sm:text-sm mr-1">₹${data.oldPrice}</span>
                            <span class="text-base sm:text-2xl font-bold text-green-600">₹${data.newPrice}</span>
                        </div>
                    </div>
                    <button onclick="orderItem('${data.whatsappName}')" class="w-full bg-[#25D366] hover:bg-[#1ebd5b] text-white font-bold py-2 sm:py-3 px-2 sm:px-4 rounded-xl transition flex justify-center items-center gap-1 sm:gap-2 shadow-sm">
                        <svg class="w-4 h-4 sm:w-5 sm:h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                        <span class="text-xs sm:text-base font-semibold">Order</span>
                    </button>
                </div>
            </div>`;
        }

        // Main render loop
        function renderItems() {
            const videoGrid = document.getElementById('video-grid');
            const cardGrid = document.getElementById('card-grid');
            
            // Clear current grids
            videoGrid.innerHTML = '';
            cardGrid.innerHTML = '';

            // Filter and render videos
            VIDEOS_FOLDER.forEach(video => {
                if (currentFilter === 'all' || video.gender === currentFilter || video.gender === 'both') {
                    videoGrid.innerHTML += createProductCard(video, 'video');
                }
            });

            // Filter and render cards
            CARDS_FOLDER.forEach(card => {
                if (currentFilter === 'all' || card.gender === currentFilter || card.gender === 'both') {
                    cardGrid.innerHTML += createProductCard(card, 'card');
                }
            });
            
            // Show message if empty
            if(videoGrid.innerHTML === '' && currentTab === 'video') {
                videoGrid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500">No videos found for this category.</div>`;
            }
            if(cardGrid.innerHTML === '' && currentTab === 'card') {
                cardGrid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500">No cards found for this category.</div>`;
            }
        }

        // Initialize the page
        renderItems();

    </script>
